analysis:
  default_lookback_days: 365
  rolling_window: 20
  peak_hours:
    start: 7
    end: 22
  transaction_cost_per_mwh: 0.05
  default_position_size_mw: 50

data:
  cache_dir: "data/cache"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  eia_api_base: "https://api.eia.gov/v2/electricity/rto"
