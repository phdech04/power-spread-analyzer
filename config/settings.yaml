isos:
  ERCOT:
    timezone: "US/Central"
    base_price: 35
    data_source: "ercot_public_api"
    node: "HB_HOUSTON"
    volatility: 45
    description: "Electric Reliability Council of Texas"

  PJM:
    timezone: "US/Eastern"
    base_price: 40
    data_source: "pjm_dataminer"
    node: "WESTERN HUB"
    volatility: 30
    description: "PJM Interconnection (Mid-Atlantic)"

  CAISO:
    timezone: "US/Pacific"
    base_price: 45
    data_source: "caiso_oasis"
    node: "TH_SP15_GEN-APND"
    volatility: 35
    description: "California Independent System Operator"

  MISO:
    timezone: "US/Central"
    base_price: 32
    data_source: "miso_api"
    node: "INDIANA.HUB"
    volatility: 28
    description: "Midcontinent Independent System Operator"

  NYISO:
    timezone: "US/Eastern"
    base_price: 45
    data_source: "nyiso_api"
    node: "ZONE J"
    volatility: 38
    description: "New York Independent System Operator"

  ISO-NE:
    timezone: "US/Eastern"
    base_price: 42
    data_source: "isone_api"
    node: "INTERNAL_HUB"
    volatility: 32
    description: "ISO New England"

  SPP:
    timezone: "US/Central"
    base_price: 28
    data_source: "spp_api"
    node: "SPS"
    volatility: 25
    description: "Southwest Power Pool"

  IESO:
    timezone: "Canada/Eastern"
    base_price: 25
    data_source: "ieso_api"
    node: "ONTARIO"
    volatility: 20
    description: "Independent Electricity System Operator (Ontario)"

weather:
  api: "open-meteo"
  base_url: "https://archive-api.open-meteo.com/v1/archive"
  locations:
